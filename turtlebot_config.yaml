scene:
  n_envs: 1
  sim:
    dt: 0.01
    substeps: 1

  show_Viewer: true

  profiling_options:
    show_FPS: true

  viewer_config:
    max_FPS: 60
    camera_pos: [1.5, -1.5, 1.0]
    camera_lookat: [0.0, 0.0, 0.0]
    camera_fov: 40

  vis_config:
    show_cameras: false
    shadow: false
    plane_reflection: false
    lights:
      - type: directional
        dir: [-1, -1, -1]
        color: [1.0, 1.0, 1.0]
        intensity: 5.0

  rigid_config:
    enable_collision: true
    enable_joint_limit: true
    enable_self_collision: false
    max_collision_pairs: 300

world:
  name: plane
  world_type: plane

objects:

robots:
  turtlebot:
    visualize_contact: false
    namespace: "turtlebot"
    control:
      joint_commands_topic: joint_commands
      joint_commands_topic_frequency: 50
      joint_states_topic: joint_states
      joint_states_topic_frequency: 50
      joint_control_topic: joint_control
      joint_control_topic_frequency: 50
      joint_properties:
        "turtlebotwheel_left_joint":
          kp: 50
          kv: 50
          command: velocity
        # FIXED: Removed extra spaces so it aligns correctly with the left joint!
        "turtlebotwheel_right_joint":  
          kp: 50
          kv: 50
          command: velocity

    # ... (Keep the rest of your pos, euler, visualization, material, and sensor configs exactly the same below this line) ...

    morph:
      path: "turtlebot3_description/urdf/turtlebot3_burger.urdf"
      pos: [0.0, 0.0, 0.0]
      euler: [0.0, 0.0, 0.0]
      quat: null
      visualization: true
      collision: true
      requires_jac_and_IK: true
      scale: 1.0
      convexify: null
      recompute_inertia: false
      fixed: false
      prioritize_urdf_material: false
      merge_fixed_links: false
      links_to_keep: ["turtlebotbase_scan"]

    material:
      type: rigid
      rho: 200.0
      friction: null
      needs_coup: true
      coup_friction: 0.1
      coup_softness: 0.002
      coup_restitution: 0.0
      sdf_cell_size: 0.005
      sdf_min_res: 32
      sdf_max_res: 128
      gravity_compensation: 0

    sensors:
    - name: lidar
      general_sensor_options:
        sensor_type: lidar
        delay: 0.0
        update_ground_truth_only: false
        draw_debug: false
      ros_options:
        frame_id: "turtlebotbase_scan"
        frequency: 10.0
        topic: scan
        qos_history: keep_last
        qos_depth: 10
        qos_reliability: reliable
        qos_durability: volatile
      rigid_options:
        link: "turtlebotbase_scan"
        pos_offset: [0.0, 0.0, 0.0]
        euler_offset: [0.0, 0.0, 0.0]
      spherical_pattern:
        fov: [360.0, 30.0]
        n_points: [64, 128]
      min_range: 0.12
      max_range: 3.5
      draw_point_radius: 0.03
      ray_start_color: [0.5, 0.5, 1.0, 1.0]
      ray_hit_color: [1.0, 0.0, 0.0, 1.0]
      return_points_in_world_frame: false
      add_noise: false
      noise_mean: 0.0
      noise_std: 0.01
